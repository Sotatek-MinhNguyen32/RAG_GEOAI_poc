# Phase 2: MCP Search Server
# Chỉ cần ES + Qdrant (read-only, dữ liệu đã được ingestion ở Phase 1)

services:
  elasticsearch:
    image: elasticsearch:8.15.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports: ["9200:9200"]
    volumes:
      - es_data:/usr/share/elasticsearch/data

  qdrant:
    image: qdrant/qdrant:v1.12.0
    ports: ["6333:6333"]
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  es_data:
  qdrant_data:
