# Phase 1: Ingestion Pipeline
# Start: docker compose -f services/docker-compose.yml up -d

services:
  api:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: geo_api
    env_file: ../.env.docker
    environment:
      # Use service name (no underscore) for boto3 hostname validation compatibility
      S3_ENDPOINT: http://minio:9000
      ES_URL: http://elasticsearch:9200
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379/0
    ports: ["8000:8000"]
    depends_on:
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  worker:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: geo_worker
    command: ["celery", "-A", "services.worker.celery_app", "worker", "-l", "info", "--concurrency=2"]
    env_file: ../.env.docker
    environment:
      # Use service name (no underscore) for boto3 hostname validation compatibility
      S3_ENDPOINT: http://minio:9000
      ES_URL: http://elasticsearch:9200
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_started
    restart: unless-stopped


  elasticsearch:
    image: elasticsearch:9.1.10
    container_name: geo_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      # CORS for ElasticVue
      - http.cors.enabled=true
      - http.cors.allow-origin=http://localhost:8080
      - http.cors.allow-headers=X-Requested-With,Content-Type,Content-Length,Authorization
    ports: ["9200:9200"]
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.12.0
    container_name: geo_qdrant
    ports: ["6333:6333"]
    volumes:
      - qdrant_data:/qdrant/storage

  redis:
    image: redis:7-alpine
    container_name: geo_redis
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: geo_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: "12345678"
    ports: ["9000:9000", "9001:9001"]
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  elasticvue:
    image: cars10/elasticvue:latest
    container_name: geo_elasticvue
    ports: ["8080:8080"]

  redis-insight:
    image: redis/redisinsight:latest
    container_name: geo_redis_insight
    ports: ["5540:5540"]
    environment:
      - REDISINSIGHT_HOST=geo_redis
      - REDISINSIGHT_PORT=6379

volumes:
  es_data:
  qdrant_data:
  minio_data:
